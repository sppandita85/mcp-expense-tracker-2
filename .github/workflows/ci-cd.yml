name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy gate
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOOK_URL: ${{ secrets.FASTMCP_DEPLOY_HOOK_URL }}
    steps:
      - name: Confirm deploy trigger
        run: |
          echo "Tests passed on main (${{ github.sha }})."
          echo "FastMCP Cloud auto-deploys from this branch once the repo is connected in the FastMCP Cloud dashboard - no extra action needed here."

      - name: Ping optional deploy webhook
        if: ${{ env.DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$DEPLOY_HOOK_URL"

  notify-on-failure:
    name: Notify development team of failed build
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = "ci-failure";
            const shortSha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `CI failure on ${context.ref} (${shortSha})`;
            const body = [
              `Build failed for commit ${context.sha} on \`${context.ref}\`.`,
              "",
              `Triggered by: @${context.actor}`,
              `Workflow run: ${runUrl}`,
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });

            if (openIssues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }
