name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy gate
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deploy trigger
        run: |
          echo "Tests passed on main (${{ github.sha }})."
          echo "FastMCP Cloud auto-deploys from this branch once the repo is connected in the FastMCP Cloud dashboard - no extra action needed here."
